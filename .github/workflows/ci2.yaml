name: CI2 Pipeline

on:
  push:
    branches: [ master ]
  pull_request:

env:
  IMAGE_NAME: Ola/demo-app
  IMAGE_TAG: juice-shop-1.1

jobs:

  # -------------------------
  # Cache + Install
  # -------------------------
  create_cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20.19
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: yarn

      - name: Install Yarn Classic
        run: npm install -g yarn@1

      - name: Install dependencies
        run: yarn install --ignore-engines

  # -------------------------
  # Yarn Tests
  # -------------------------
  yarn_test:
    runs-on: ubuntu-latest
    needs: create_cache
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 20.19
        uses: actions/setup-node@v4
        with:
          node-version: 20.19
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Run tests
        run: yarn test

  # -------------------------
  # Gitleaks
  # -------------------------
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        with:
          args: detect --source . --verbose --format json --report-path gitleaks-report.json

      - name: Ensure report exists
        run: touch gitleaks-report.json
        if: always()

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
        if: always()

  # -------------------------
  # njsscan
  # -------------------------
  njsscan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install njsscan
        run: pip install --upgrade njsscan

      - name: Run njsscan
        run: njsscan --exit-warning . --sarif -o njsscan.sarif

      - name: Upload njsscan report
        uses: actions/upload-artifact@v4
        with:
          name: njsscan-report
          path: njsscan.sarif
        if: always()

  # -------------------------
  # Semgrep
  # -------------------------
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
